services:
    workbench:
        build:
            context: ./docker/8.4
            dockerfile: Dockerfile
            args:
                WWWGROUP: '${WWWGROUP:-33}'
        image: workbench-app/php-8.4
        extra_hosts:
            - 'host.docker.internal:host-gateway'
        ports:
            - '${APP_PORT:-8083}:80'
            - '${REVERB_EXTERNAL_PORT:-8084}:8080'
        volumes:
            - '.:/var/www/html'
            - './docker/8.4/supervisord.conf:/etc/supervisor/conf.d/supervisord.conf'
        environment:
            WWWUSER: '${WWWUSER}'
            LARAVEL_SAIL: 1
            SUPERVISOR_PHP_COMMAND: '/usr/bin/php -d variables_order=EGPCS /var/www/html/artisan serve --host=0.0.0.0 --port=80'
            SUPERVISOR_PHP_USER: 'sail'
            PHP_IDE_CONFIG: 'serverName=workbench'
            XDEBUG_MODE: '${XDEBUG_MODE:-off}'
            XDEBUG_CONFIG: 'client_host=host.docker.internal'
            VITE_PORT: '${VITE_PORT:-5176}'
            SUPERVISOR_START_NPM: '${SUPERVISOR_START_NPM:-true}'
            SUPERVISOR_START_QUEUE: '${SUPERVISOR_START_QUEUE:-false}'
        networks:
            - sail
    redis:
        image: 'redis:alpine'
        ports:
            - '${FORWARD_REDIS_PORT:-6383}:6379'
        volumes:
            - 'sail-redis:/data'
        networks:
            - sail
        healthcheck:
            test:
                - CMD
                - redis-cli
                - ping
            retries: 3
            timeout: 5s
networks:
    sail:
        driver: bridge
volumes:
    sail-redis:
        driver: local
